    <!-- Main Body -->
    <rect x="156" y="100" width="200" height="312" rx="20" fill="#5D4037"/>
    <!-- Texture Lines -->
    <path d="M170 120H340" stroke="#4E342E" stroke-width="4" stroke-opacity="0.5"/>
    <path d="M170 160H340" stroke="#4E342E" stroke-width="4" stroke-opacity="0.5"/>
    <path d="M170 240H340" stroke="#4E342E" stroke-width="4" stroke-opacity="0.5"/>
    <path d="M170 280H340" stroke="#4E342E" stroke-width="4" stroke-opacity="0.5"/>
    <path d="M170 360H340" stroke="#4E342E" stroke-width="4" stroke-opacity="0.5"/>
    <path d="M170 400H340" stroke="#4E342E" stroke-width="4" stroke-opacity="0.5"/>

